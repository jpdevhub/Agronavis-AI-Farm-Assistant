name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Use placeholder values for the build — real secrets live in Vercel
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
          NEXT_PUBLIC_API_BASE_URL: https://karansingh12-agronavis-backend.hf.space/api
          NEXT_PUBLIC_API_URL: https://karansingh12-agronavis-backend.hf.space
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WEATHER_API_KEY: placeholder

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci
          NEXT_PUBLIC_API_BASE_URL: https://karansingh12-agronavis-backend.hf.space/api
          NEXT_PUBLIC_API_URL: https://karansingh12-agronavis-backend.hf.space
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ── Python Backend ────────────────────────────────────────────────────────
  backend:
    name: Backend — Python lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pyright
          # Install app deps but skip heavy torch/torchvision to keep CI fast
          pip install fastapi uvicorn[standard] python-dotenv supabase pydantic python-multipart

      - name: Lint with flake8
        run: |
          # Fatal errors only (syntax errors, undefined names, etc.)
          flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Syntax check
        run: python -m py_compile main.py && echo "Syntax OK"

  # ── Deploy Backend → Hugging Face Space ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend → HF Space
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    # Only deploy on push to main (not on PRs, not on develop)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # ── 1. Validate model architecture BEFORE pushing ──────────────────
      - name: Setup Python for model test
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install torch (CPU) for model self-test
        run: |
          pip install --quiet \
            torch==2.3.0+cpu torchvision==0.18.0+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Download model weights from HF Space (LFS)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --quiet huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import hf_hub_download
          token = os.environ["HF_TOKEN"]
          # Download the model weights that live on the HF Space (not in GitHub)
          path = hf_hub_download(
              repo_id="karansingh12/agronavis-backend",
              repo_type="space",
              filename="model/plant_disease_resnet18.pth",
              token=token,
              local_dir="backend",
          )
          print(f"Downloaded weights to: {path}")
          EOF

      - name: Run model architecture self-test
        working-directory: backend
        run: python test_model_arch.py

      # ── 2. Prepare deploy directory ───────────────────────────────────
      - name: Prepare HF Space payload
        run: |
          mkdir -p hf_deploy
          # Copy all backend source files
          cp backend/main.py       hf_deploy/
          cp backend/chatbot.py    hf_deploy/
          cp backend/app.py        hf_deploy/
          cp backend/test_model_arch.py hf_deploy/
          cp backend/hf_requirements.txt hf_deploy/requirements.txt
          cp backend/hf_README.md  hf_deploy/README.md
          # Copy model directory (class names + weights)
          cp -r backend/model      hf_deploy/model

      # ── 3. Push to HF Space via git ───────────────────────────────────
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_deploy
          git init
          git config user.email "ci@agronavis.ai"
          git config user.name "AgroNavis CI"
          git lfs install
          # Track large model file via LFS
          git lfs track "model/*.pth"
          git add .gitattributes
          git add .
          git commit -m "ci: deploy $(date -u '+%Y-%m-%d %H:%M UTC') [$(git -C .. rev-parse --short HEAD)]"
          git remote add hf \
            https://karansingh12:${HF_TOKEN}@huggingface.co/spaces/karansingh12/agronavis-backend
          git push hf main --force

      # ── 4. Set Space secrets (idempotent) ────────────────────────────
      - name: Sync secrets to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install --quiet huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "karansingh12/agronavis-backend"

          secrets_to_set = {
              "SUPABASE_URL":              os.environ["SUPABASE_URL"],
              "SUPABASE_SERVICE_ROLE_KEY": os.environ["SUPABASE_SERVICE_ROLE_KEY"],
              "SUPABASE_ANON_KEY":         os.environ["SUPABASE_ANON_KEY"],
              "GEMINI_API_KEY":            os.environ["GEMINI_API_KEY"],
          }

          for name, value in secrets_to_set.items():
              if value:
                  api.add_space_secret(repo_id=repo, key=name, value=value)
                  print(f"  Set secret: {name}")
              else:
                  print(f"  Skipped (empty): {name}")

          print("Done syncing secrets.")
          EOF

