name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Use placeholder values for the build — real secrets live in Vercel
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
          NEXT_PUBLIC_API_BASE_URL: https://agronavis-backend.onrender.com/api
          NEXT_PUBLIC_API_URL: https://agronavis-backend.onrender.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WEATHER_API_KEY: placeholder

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci
          NEXT_PUBLIC_API_BASE_URL: https://agronavis-backend.onrender.com/api
          NEXT_PUBLIC_API_URL: https://agronavis-backend.onrender.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ── Python Backend ────────────────────────────────────────────────────────
  backend:
    name: Backend — Python lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pyright
          # Install app deps but skip heavy torch/torchvision to keep CI fast
          pip install fastapi uvicorn[standard] python-dotenv supabase pydantic python-multipart

      - name: Lint with flake8
        run: |
          # Fatal errors only (syntax errors, undefined names, etc.)
          flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Syntax check
        run: python -m py_compile main.py && echo "Syntax OK"

  # ── Deploy Backend → Render.com ───────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    # Only deploy on push to main (not on PRs, not on develop)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Render auto-deploys from GitHub on every push to main.
      # The deploy hook is a fallback to force a redeploy.
      # Add RENDER_DEPLOY_HOOK_URL to GitHub Secrets (from Render dashboard).
      - name: Trigger Render Redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deploy..."
            curl -fsSL "$RENDER_DEPLOY_HOOK_URL" -o /dev/null -w "HTTP %{http_code}\n"
            echo "Deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — Render will auto-deploy from GitHub push."
          fi

      - name: Summary
        run: |
          echo "✅ Backend deploying to Render.com"
          echo "   Dashboard: https://dashboard.render.com"
          echo "   Live API:  https://agronavis-backend.onrender.com"
